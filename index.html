<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Profile and Resume">
    <title>Professional Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#experience">Experience</a></li>
                    <li><a href="#skills">Skills</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="home" class="hero">
                <div class="hero-content">
                    <h1>Welcome to My Professional Profile</h1>
                    <p class="subtitle">Associate VP of Software Engineering | Industry Expert</p>
                    <a href="#contact" class="cta-button">Get In Touch</a>
                </div>
            </section>

            <section id="profile-content">
                <div id="markdown-content">
                    <!-- Markdown content will be loaded here -->
                    <p>Loading profile content...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; <span id="year"></span> Professional Profile. All rights reserved.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Set current year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // Load and render markdown content
        fetch('profile.html')
            .then(response => response.text())
            .then(html => {
                // Jekyll already processed the markdown to HTML.
                // Ensure we only inject the inner content, not an entire HTML document.
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                var content = (doc.body && doc.body.innerHTML.trim()) ? doc.body.innerHTML : html;
                document.getElementById('markdown-content').innerHTML = content;

                // Smooth scroll for anchor links
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function (e) {
                        e.preventDefault();
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) {
                            target.scrollIntoView({
                                behavior: 'smooth'
                            });
                        }
                    });
                });
            })
            .catch(error => {
                console.error('Error loading profile:', error);
                document.getElementById('markdown-content').innerHTML =
                    '<p>Error loading profile content. Please check if profile.html exists.</p>';
            });
    </script>
</body>

</html>
